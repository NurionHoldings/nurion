<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1220"/>
      <stop offset="55%" stop-color="#0d1d31"/>
      <stop offset="100%" stop-color="#09111c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#1ec8ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1ec8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="18%" r="45%">
      <stop offset="0%" stop-color="#8be8ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8be8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow1)"/>
  <rect width="1600" height="1000" fill="url(#glow2)"/>

  <g opacity="0.22">
    <path d="M0 850 Q250 760 470 820 T950 790 T1600 840 L1600 1000 L0 1000 Z" fill="#0f2b47"/>
    <path d="M0 880 Q250 820 450 860 T920 845 T1600 885 L1600 1000 L0 1000 Z" fill="#123657"/>
  </g>

  <g filter="url(#blur)">
    <circle cx="1260" cy="220" r="120" fill="#13aef0" opacity="0.18"/>
    <circle cx="340" cy="180" r="160" fill="#64e0ff" opacity="0.16"/>
  </g>

  <!-- skyline -->
  <g opacity="0.32">
    <rect x="1150" y="180" width="80" height="360" rx="6" fill="#173450"/>
    <rect x="1240" y="120" width="120" height="420" rx="6" fill="#14314d"/>
    <rect x="1378" y="230" width="90" height="310" rx="6" fill="#10273e"/>
    <rect x="1478" y="160" width="70" height="380" rx="6" fill="#15314b"/>
    <g fill="#87cfff" opacity="0.4">
      <g>
        <rect x="1260" y="160" width="14" height="14"/><rect x="1288" y="160" width="14" height="14"/><rect x="1316" y="160" width="14" height="14"/>
        <rect x="1260" y="195" width="14" height="14"/><rect x="1288" y="195" width="14" height="14"/><rect x="1316" y="195" width="14" height="14"/>
        <rect x="1260" y="230" width="14" height="14"/><rect x="1288" y="230" width="14" height="14"/><rect x="1316" y="230" width="14" height="14"/>
        <rect x="1260" y="265" width="14" height="14"/><rect x="1288" y="265" width="14" height="14"/><rect x="1316" y="265" width="14" height="14"/>
      </g>
    </g>
  </g>

  <!-- main card -->
  <g filter="url(#shadow)">
    <rect x="110" y="130" width="850" height="560" rx="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
    <rect x="150" y="170" width="260" height="22" rx="11" fill="rgba(255,255,255,0.16)"/>
    <rect x="150" y="220" width="520" height="22" rx="11" fill="rgba(255,255,255,0.12)"/>
    <rect x="150" y="255" width="470" height="18" rx="9" fill="rgba(255,255,255,0.08)"/>
    <rect x="150" y="350" width="360" height="260" rx="24" fill="rgba(8,19,32,0.72)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="540" y="350" width="380" height="120" rx="24" fill="rgba(8,19,32,0.72)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="540" y="490" width="180" height="120" rx="24" fill="rgba(8,19,32,0.72)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="740" y="490" width="180" height="120" rx="24" fill="rgba(8,19,32,0.72)" stroke="rgba(255,255,255,0.08)"/>
  </g>

  <!-- chart -->
  <g>
    <path d="M185 555 C250 500, 300 540, 375 470 S510 360, 590 410 S700 465, 835 320" fill="none" stroke="#56d7ff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="185" cy="555" r="7" fill="#56d7ff"/>
    <circle cx="375" cy="470" r="7" fill="#56d7ff"/>
    <circle cx="590" cy="410" r="7" fill="#56d7ff"/>
    <circle cx="835" cy="320" r="7" fill="#56d7ff"/>
    <path d="M185 580 C250 525, 300 565, 375 495 S510 385, 590 440 S700 495, 835 350 L835 610 L185 610 Z" fill="url(#glow1)" opacity="0.33"/>
  </g>

  <!-- KPI boxes -->
  <g fill="#d9f3ff">
    <text x="570" y="400" font-size="24" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">전략 · 재무 · 실행 로드맵</text>
    <text x="570" y="430" font-size="18" font-family="Pretendard, Noto Sans KR, sans-serif" fill="#9fc8da">실행형 기업컨설팅 대시보드</text>
    <text x="575" y="555" font-size="42" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="800">90D</text>
    <text x="575" y="585" font-size="18" font-family="Pretendard, Noto Sans KR, sans-serif" fill="#9fc8da">실행 로드맵</text>
    <text x="775" y="555" font-size="42" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="800">BEP</text>
    <text x="775" y="585" font-size="18" font-family="Pretendard, Noto Sans KR, sans-serif" fill="#9fc8da">수익 구조 점검</text>
  </g>

  <!-- people silhouettes -->
  <g transform="translate(1020,420)">
    <ellipse cx="210" cy="240" rx="250" ry="68" fill="#08111b" opacity="0.75"/>
    <g fill="#0f2031">
      <rect x="0" y="70" width="420" height="180" rx="20"/>
      <rect x="30" y="160" width="360" height="18" rx="9" fill="#12334f"/>
    </g>
    <g>
      <circle cx="90" cy="80" r="34" fill="#8baac0"/>
      <path d="M55 215 q35-92 70 0 v-56 q0-40-35-40t-35 40z" fill="#d8e5ee"/>
      <circle cx="200" cy="55" r="30" fill="#9bb9ce"/>
      <path d="M165 205 q35-95 70 0 v-52 q0-36-35-36t-35 36z" fill="#e1edf5"/>
      <circle cx="310" cy="84" r="34" fill="#8eaec3"/>
      <path d="M275 215 q35-92 70 0 v-56 q0-40-35-40t-35 40z" fill="#d7e5ef"/>
    </g>
  </g>
</svg>